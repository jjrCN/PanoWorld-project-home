<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="PanoWorld 全屋全景交互漫游独立服务。">
  <title>PanoWorld 全屋全景交互漫游</title>
  <link rel="preload" as="image" href="./assets/images/pano-tour-map.webp" type="image/webp">
  <link rel="preload" as="image" href="./assets/panos/0000.webp" type="image/webp">
  <link rel="preload" as="image" href="./assets/panos-simple/0000.webp" type="image/webp">
  <link rel="stylesheet" href="./static/css/tour.css?v=20260519d">
  <script type="module" src="./static/js/pano-tour.js?v=20260519c"></script>
</head>
<body>
  <main class="tour-app">
    <section class="tour-shell" aria-labelledby="tour-title">
      <div class="tour-header">
        <button id="pano-tour-like-toggle" class="pano-tour-like-button pano-tour-like-button--page" type="button" aria-pressed="false">
          <span class="pano-tour-like-icon" aria-hidden="true">❤</span>
          <span id="pano-tour-like-label" class="pano-tour-like-label">点赞</span>
          <span id="pano-tour-like-count" class="pano-tour-like-count">0</span>
        </button>
        <p class="tour-kicker">AI全景生成独立交互服务（贝壳-多模智能-AI渲染团队）</p>
        <h1 id="tour-title" class="tour-title">全屋全景交互漫游</h1>
      </div>

      <div class="pano-tour-card">
        <div class="pano-tour-overview">
          <div class="pano-tour-copy">
            <p>
              通过 VR 风格的查看器探索AI算法生成的全屋全景结果。
            </p>
            <p>
              给定户型图和风格参考图，算法可以为整套房屋生成一组指定风格的全景图，并在不同视角之间保持较强的一致性。
            </p>
            <p>
              你可以通过右侧风格按钮在不同风格之间切换。
            </p>
            <p>
              支持拖拽旋转、滚轮缩放，并可通过场景中的悬浮光圈或右侧户型图导航进行点位跳转。
            </p>
            <p>
              更多户型、风格展示敬请期待。
            </p>
          </div>

          <div id="pano-tour-map" class="pano-tour-map" aria-label="俯视户型导航图">
            <div class="pano-tour-map-header">
              <span class="pano-tour-map-title">户型图导航</span>
              <span class="pano-tour-map-subtitle">当前点位已高亮显示</span>
            </div>
            <div class="pano-tour-map-viewport">
              <img
                src="./assets/images/pano-tour-map.webp"
                alt="用于全景点位跳转的俯视户型图。"
                class="pano-tour-map-image"
                width="900"
                height="600"
                decoding="async">
              <div id="pano-tour-map-markers" class="pano-tour-map-markers"></div>
            </div>
          </div>
        </div>

        <div id="pano-tour-stage" class="pano-tour-stage">
          <div id="pano-tour-loading" class="pano-tour-loading">
            <span class="pano-tour-spinner" aria-hidden="true"></span>
            <span>正在加载全景漫游...</span>
          </div>
          <div id="pano-tour-fade" class="pano-tour-fade"></div>
          <div id="pano-tour-hotspots" class="pano-tour-hotspots" aria-hidden="false"></div>
          <div class="pano-tour-hud">
            <span id="pano-tour-current" class="pano-tour-badge">点位 0000</span>
            <span id="pano-tour-style" class="pano-tour-badge pano-tour-badge--secondary">法式轻奢风格</span>
          </div>
          <div class="pano-tour-stage-actions">
            <button id="pano-tour-style-toggle" class="pano-tour-reset" type="button">切换到现代简约风格</button>
          </div>
          <div id="pano-tour-tooltip" class="pano-tour-tooltip" hidden></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
